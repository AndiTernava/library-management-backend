spring.application.name=library-management-backend

# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate (JPA) Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT configuration
jwt.secret=MySuperSecretKey12345
jwt.expirationMs=3600000

# Application version (pėrdoret nga AppInterceptor)
app.version=2.5

spring.security.user.name=admin
spring.security.user.password=admin


# Use Caffeine as the cache provider
spring.cache.type=caffeine

# Caffeine ?spec? for all caches: max 500 entries, expire 10m after write
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# (Optional) SQL logging for verifying cache hits
logging.level.org.hibernate.SQL=DEBUG
